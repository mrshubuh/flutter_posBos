name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # Menggunakan latest stable version otomatis

      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Clean Flutter
        run: flutter clean

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Run code generation (if needed)
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Run Flutter analyzer
        run: flutter analyze
        continue-on-error: true

      - name: Run Flutter tests
        run: flutter test
        continue-on-error: true

      - name: Build APK (Release)
        run: flutter build apk --release --verbose

      - name: Build App Bundle (Release)
        run: flutter build appbundle --release --verbose

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Rename APK with version
        run: |
          mkdir -p build/outputs
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/outputs/flutter-pos-${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-pos-apk-${{ steps.version.outputs.version }}
          path: build/outputs/flutter-pos-${{ steps.version.outputs.version }}.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-pos-aab-${{ steps.version.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ APK built successfully" >> $GITHUB_STEP_SUMMARY
          echo "📦 Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "📱 APK Size: $(du -h
