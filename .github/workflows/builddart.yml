name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: flutter --version

      - name: Clean project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (freezed, json_serializable)
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs || true
        continue-on-error: true

      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build App Bundle (Release)  
        run: flutter build appbundle --release --no-tree-shake-icons
        continue-on-error: true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare APK
        run: |
          mkdir -p outputs
          cp build/app/outputs/flutter-apk/app-release.apk outputs/flutter-pos-${{ steps.version.outputs.version }}.apk
          ls -lh outputs/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ steps.version.outputs.version }}
          path: outputs/flutter-pos-${{ steps.version.outputs.version }}.apk
          retention-days: 30

      - name: Upload AAB (if exists)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: AAB-${{ steps.version.outputs.version }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
        continue-on-error: true

      - name: Build info
        run: |
          echo "✅ APK built successfully!"
          echo "📦 Version: ${{ steps.version.outputs.version }}"
          echo "📱 APK: $(du -h outputs/flutter-pos-${{ steps.version.outputs.version }}.apk | cut -f1)"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: outputs/flutter-pos-${{ steps.version.outputs.version }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
